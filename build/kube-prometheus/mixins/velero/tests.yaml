rule_files:
  - prometheus.yaml   # The file containing your Velero alert rule

tests:
  # ───────────────────────────────────────────────
  # (1) Velero pod is UP, >25h old, metric is 0.
  #     -> Alert should fire.
  # ───────────────────────────────────────────────
  - interval: 5m
    input_series:
      - series: 'up{pod="velero"}'
        values: '1+0x4'  # Pod active (samples at 0m, 5m, 10m, 15m, 20m)
      - series: 'process_start_time_seconds{pod="velero"}'
        values: '-91000+0x4'  # Pod started 91000s ago (> 25 hours)
      - series: 'velero_backup_last_successful_timestamp{schedule="daily"}'
        values: '0+0x4'  # Timestamp is 0
    alert_rule_test:
      - eval_time: 15m
        alertname: VeleroNoFirstSuccessfulBackup
        exp_alerts:
          - exp_labels:
              severity: critical
              schedule: daily
            exp_annotations:
              summary: "Velero backup has not completed once successfully for any schedule."
              description: "No successful Velero backups have been detected for schedule: daily while the Velero pod is running.This likely indicates a configuration or permission issue preventing backups from completing."

  # ───────────────────────────────────────────────
  # (2) Velero pod is DOWN — no alert should fire.
  # ───────────────────────────────────────────────
  - interval: 5m
    input_series:
      - series: 'up{pod="velero"}'
        values: '0+0x4'  # Pod down
      - series: 'process_start_time_seconds{pod="velero"}'
        values: '-91000+0x4'
      - series: 'velero_backup_last_successful_timestamp{schedule="daily"}'
        values: '0+0x4'
    alert_rule_test:
      - eval_time: 15m
        alertname: VeleroNoFirstSuccessfulBackup
        exp_alerts: []

  # ───────────────────────────────────────────────
  # (3) Velero pod UP, >25h old, backup completes.
  #     -> Alert should clear.
  # ───────────────────────────────────────────────
  - interval: 5m
    input_series:
      - series: 'up{pod="velero"}'
        values: '1+0x4'
      - series: 'process_start_time_seconds{pod="velero"}'
        values: '-91000+0x4'
      - series: 'velero_backup_last_successful_timestamp{schedule="daily"}'
        # Starts at 0 for first two intervals (0m, 5m), then gets a valid unix timestamp at 10m, 15m, 20m
        values: '0 0 1777334592 1777334592 1777334592'
    alert_rule_test:
      - eval_time: 20m
        alertname: VeleroNoFirstSuccessfulBackup
        exp_alerts: []

  # ───────────────────────────────────────────────
  # (4) Velero pod UP, >25h old, metric completely MISSING.
  #     -> Alert should fire via the `absent()` condition.
  # ───────────────────────────────────────────────
  - interval: 5m
    input_series:
      - series: 'up{pod="velero"}'
        values: '1+0x4'
      - series: 'process_start_time_seconds{pod="velero"}'
        values: '-91000+0x4'
        # Notice: velero_backup_last_successful_timestamp series is intentionally omitted here
    alert_rule_test:
      - eval_time: 15m
        alertname: VeleroNoFirstSuccessfulBackup
        exp_alerts:
          - exp_labels:
              severity: critical
              # Note: `absent()` does not output the `schedule` label, which perfectly tests your `{{ else }}` annotation logic
            exp_annotations:
              summary: "Velero backup has not completed once successfully for any schedule."
              description: "Velero backup metrics are missing while the Velero pod is running. This may indicate that the backup metric is not being emitted or there is a configuration/permission issue."

  # ───────────────────────────────────────────────
  # (5) Velero pod UP, metric is 0, BUT pod is NEW (< 25h).
  #     -> Alert should NOT fire (verifying the grace period).
  # ───────────────────────────────────────────────
  - interval: 5m
    input_series:
      - series: 'up{pod="velero"}'
        values: '1+0x4'
      - series: 'process_start_time_seconds{pod="velero"}'
        values: '-3600+0x4'  # Pod started only 1 hour ago (3600s), which is less than 25h (90000s)
      - series: 'velero_backup_last_successful_timestamp{schedule="daily"}'
        values: '0+0x4'
    alert_rule_test:
      - eval_time: 15m
        alertname: VeleroNoFirstSuccessfulBackup
        exp_alerts: []
