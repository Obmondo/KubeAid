# Source: kyverno/templates/harbor-proxy-cache/harbor-proxy-cache-mutate.yaml
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: harbor-proxy-cache-mutate
  annotations:
    policies.kyverno.io/title: "Redirect Docker Hub images to Harbor proxy cache"
    policies.kyverno.io/category: "Image Registry"
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: "Pod,Deployment,StatefulSet,DaemonSet,Job,CronJob"
    policies.kyverno.io/description: >-
      Automatically redirects docker.io and registry-1.docker.io images to Harbor proxy cache
      to bypass Docker Hub rate limits. This policy mutates container images at admission time.
    kyverno.io/kubernetes-version: "1.27"
    policies.kyverno.io/minversion: 1.11.4
spec:
  admission: true
  background: true
  emitWarning: false
  failurePolicy: Ignore
  mutateExistingOnPolicyUpdate: false
  rules:
    # Pod: only CREATE. K8s forbids changing imagePullSecrets on existing pods (UPDATE).
    - name: mutate-docker-io-containers
      match:
        any:
          - resources:
              kinds:
                - Pod
              operations:
                - CREATE
      mutate:
        foreach:
          # Handle index.docker.io/ images
          - list: "request.object.spec.containers[]"
            preconditions:
              all:
                - key: "{{ contains(element.image, 'harbor.example.com') }}"
                  operator: Equals
                  value: false
              any:
                - key: "{{ contains(element.image, 'index.docker.io/') }}"
                  operator: Equals
                  value: true
                - key: "{{ contains(element.image, 'registry-1.docker.io/') }}"
                  operator: Equals
                  value: true
            context:
              - name: resolvedImage
                variable:
                  value: "{{ replace_all(replace_all(element.image, 'index.docker.io/', ''), 'registry-1.docker.io/', '') }}"
            patchStrategicMerge:
              spec:
                containers:
                  - (name): "{{ element.name }}"
                    image: "harbor.example.com/docker-hub-proxy-cache/{{ resolvedImage }}"
                imagePullSecrets:
                  - name: harbor-proxy-cache
          # Handle docker.io/ images (but not index.docker.io/)
          - list: "request.object.spec.containers[]"
            preconditions:
              all:
                - key: "{{ contains(element.image, 'harbor.example.com') }}"
                  operator: Equals
                  value: false
                - key: "{{ contains(element.image, 'index.docker.io/') }}"
                  operator: Equals
                  value: false
                - key: "{{ contains(element.image, 'registry-1.docker.io/') }}"
                  operator: Equals
                  value: false
                - key: "{{ contains(element.image, 'docker.io/') }}"
                  operator: Equals
                  value: true
            context:
              - name: resolvedImage
                variable:
                  value: "{{ replace_all(element.image, 'docker.io/', '') }}"
            patchStrategicMerge:
              spec:
                containers:
                  - (name): "{{ element.name }}"
                    image: "harbor.example.com/docker-hub-proxy-cache/{{ resolvedImage }}"
                imagePullSecrets:
                  - name: harbor-proxy-cache
          # Handle implicit org/user Docker Hub images (e.g., graylog/graylog:6.3.1, velero/velero:v1.17.1)
          - list: "request.object.spec.containers[]"
            preconditions:
              all:
                - key: "{{ contains(element.image, 'harbor.example.com') }}"
                  operator: Equals
                  value: false
                - key: "{{ contains(element.image, 'docker.io/') }}"
                  operator: Equals
                  value: false
                - key: "{{ contains(element.image, 'index.docker.io/') }}"
                  operator: Equals
                  value: false
                - key: "{{ contains(element.image, 'registry-1.docker.io/') }}"
                  operator: Equals
                  value: false
                - key: "{{ regex_match('^[^/.:]+/.+$', element.image) }}"
                  operator: Equals
                  value: true
            patchStrategicMerge:
              spec:
                containers:
                  - (name): "{{ element.name }}"
                    image: "harbor.example.com/docker-hub-proxy-cache/{{ element.image }}"
                imagePullSecrets:
                  - name: harbor-proxy-cache
          # Handle implicit official Docker Hub images (e.g., nginx:1.27.1, nats:2.11.1-alpine)
          - list: "request.object.spec.containers[]"
            preconditions:
              all:
                - key: "{{ contains(element.image, 'harbor.example.com') }}"
                  operator: Equals
                  value: false
                - key: "{{ contains(element.image, 'docker.io/') }}"
                  operator: Equals
                  value: false
                - key: "{{ contains(element.image, 'index.docker.io/') }}"
                  operator: Equals
                  value: false
                - key: "{{ contains(element.image, 'registry-1.docker.io/') }}"
                  operator: Equals
                  value: false
                - key: "{{ regex_match('^[^/]+$', element.image) }}"
                  operator: Equals
                  value: true
            patchStrategicMerge:
              spec:
                containers:
                  - (name): "{{ element.name }}"
                    image: "harbor.example.com/docker-hub-proxy-cache/library/{{ element.image }}"
                imagePullSecrets:
                  - name: harbor-proxy-cache
          # Handle index.docker.io/ initContainers
          - list: "request.object.spec.initContainers[]"
            preconditions:
              all:
                - key: "{{ contains(element.image, 'harbor.example.com') }}"
                  operator: Equals
                  value: false
              any:
                - key: "{{ contains(element.image, 'index.docker.io/') }}"
                  operator: Equals
                  value: true
                - key: "{{ contains(element.image, 'registry-1.docker.io/') }}"
                  operator: Equals
                  value: true
            context:
              - name: resolvedImage
                variable:
                  value: "{{ replace_all(replace_all(element.image, 'index.docker.io/', ''), 'registry-1.docker.io/', '') }}"
            patchStrategicMerge:
              spec:
                initContainers:
                  - (name): "{{ element.name }}"
                    image: "harbor.example.com/docker-hub-proxy-cache/{{ resolvedImage }}"
                imagePullSecrets:
                  - name: harbor-proxy-cache
          # Handle docker.io/ initContainers (but not index.docker.io/)
          - list: "request.object.spec.initContainers[]"
            preconditions:
              all:
                - key: "{{ contains(element.image, 'harbor.example.com') }}"
                  operator: Equals
                  value: false
                - key: "{{ contains(element.image, 'index.docker.io/') }}"
                  operator: Equals
                  value: false
                - key: "{{ contains(element.image, 'registry-1.docker.io/') }}"
                  operator: Equals
                  value: false
                - key: "{{ contains(element.image, 'docker.io/') }}"
                  operator: Equals
                  value: true
            context:
              - name: resolvedImage
                variable:
                  value: "{{ replace_all(element.image, 'docker.io/', '') }}"
            patchStrategicMerge:
              spec:
                initContainers:
                  - (name): "{{ element.name }}"
                    image: "harbor.example.com/docker-hub-proxy-cache/{{ resolvedImage }}"
                imagePullSecrets:
                  - name: harbor-proxy-cache
          # Handle implicit org/user initContainers (e.g., graylog/graylog:6.3.1)
          - list: "request.object.spec.initContainers[]"
            preconditions:
              all:
                - key: "{{ contains(element.image, 'harbor.example.com') }}"
                  operator: Equals
                  value: false
                - key: "{{ contains(element.image, 'docker.io/') }}"
                  operator: Equals
                  value: false
                - key: "{{ contains(element.image, 'index.docker.io/') }}"
                  operator: Equals
                  value: false
                - key: "{{ contains(element.image, 'registry-1.docker.io/') }}"
                  operator: Equals
                  value: false
                - key: "{{ regex_match('^[^/.:]+/.+$', element.image) }}"
