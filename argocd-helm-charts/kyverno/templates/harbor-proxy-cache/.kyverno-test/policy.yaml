                  - (name): "{{ element.name }}"
                    image: "harbor.example.com/docker-hub-proxy-cache/{{ element.image }}"
                imagePullSecrets:
                  - name: harbor-proxy-cache
          # Handle implicit official initContainers (e.g., nginx:1.27.1)
