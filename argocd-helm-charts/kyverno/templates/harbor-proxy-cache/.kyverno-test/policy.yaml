                          - name: harbor-proxy-cache
          # Handle implicit official CronJob initContainers (e.g., nginx:1.27.1)
          - list: "request.object.spec.jobTemplate.spec.template.spec.initContainers[]"
            preconditions:
              all:
                - key: "{{ contains(element.image, 'harbor.example.com') }}"
                  operator: Equals
                  value: false
                - key: "{{ contains(element.image, 'docker.io/') }}"
                  operator: Equals
                  value: false
                - key: "{{ contains(element.image, 'index.docker.io/') }}"
                  operator: Equals
                  value: false
                - key: "{{ contains(element.image, 'registry-1.docker.io/') }}"
                  operator: Equals
                  value: false
                - key: "{{ regex_match('^[^/]+$', element.image) }}"
                  operator: Equals
                  value: true
            patchStrategicMerge:
              spec:
                jobTemplate:
                  spec:
                    template:
                      spec:
                        initContainers:
                          - (name): "{{ element.name }}"
                            image: "harbor.example.com/docker-hub-proxy-cache/library/{{ element.image }}"
                        imagePullSecrets:
                          - name: harbor-proxy-cache
