---
{{- if .Values.failoverIP | trim | eq "" }}
{{- fail "failoverIP must be provided" }}
{{- end }}

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-failover
  labels:
    app: {{ .Release.Name }}-failover
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-failover
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-failover
    spec:
      # Needs to read Node objects (get nodes) to resolve this node's ExternalIP.
      serviceAccountName: {{ .Release.Name }}-failover
      containers:
      - name: {{ .Release.Name }}-failover
        image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
        env:
        - name: FAILOVER_IP
          value: {{ .Values.failoverIP }}
        - name: CRON_TIME_INTERVAL
          value: {{ .Values.cronTimeInterval }}
        # The pod's own node name. The controller looks the Node up via the
        # Kubernetes API and uses its ExternalIP (public main IP) as the Robot
        # Failover target. status.hostIP cannot be used here: with kubelet
        # --node-ip set to the private vSwitch network it is an RFC1918 address,
        # which the Robot API rejects with FAILOVER_NEW_SERVER_NOT_FOUND.
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: HETZNER_ROBOT_USERNAME
          valueFrom:
            secretKeyRef:
              name: {{ .Values.cloudCredentialsSecretName }}
              key: robot-user
        - name: HETZNER_ROBOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.cloudCredentialsSecretName }}
              key: robot-password
        - name: HETZNER_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ .Values.cloudCredentialsSecretName }}
              key: hcloud
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            # Match the binary by its full argv. The [h] makes the pattern match
            # the running process but not pgrep's own /bin/sh wrapper (whose argv
            # literally contains "[h]etzner..."). Plain "pgrep hetzner-failover"
            # never matched: the kernel truncates comm to 15 chars
            # ("hetzner-failove"), so the probe always failed.
            - "pgrep -f '[h]etzner-failover-script'"
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            # Match the binary by its full argv. The [h] makes the pattern match
            # the running process but not pgrep's own /bin/sh wrapper (whose argv
            # literally contains "[h]etzner..."). Plain "pgrep hetzner-failover"
            # never matched: the kernel truncates comm to 15 chars
            # ("hetzner-failove"), so the probe always failed.
            - "pgrep -f '[h]etzner-failover-script'"
          initialDelaySeconds: 15
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 3
      nodeSelector:
        node-role.kubernetes.io/control-plane: ""
      # The failover pod is pinned to control-plane nodes (nodeSelector above),
      # so it must also tolerate their NoSchedule taint — otherwise the
      # scheduler filters out every eligible node and the pod stays Pending.
      # "master" is the pre-1.24 spelling of the same taint, kept for older
      # clusters that still carry it.
      tolerations:
      - key: node-role.kubernetes.io/control-plane
        effect: NoSchedule
      - key: node-role.kubernetes.io/master
        effect: NoSchedule
