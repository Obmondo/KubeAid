# linuxaid-agents — run the LinuxAid OpenVox agent on every node, hourly.
#
# A non-privileged launcher CronJob (linuxaid-agent) lists the cluster's nodes and
# creates one ephemeral privileged agent Job per node each run — so there is no
# static node list. Deploy into the namespace that holds the obmondo-clientcert
# secret (e.g. monitoring); it must permit privileged pods (PSA).

# Fan-out launcher image (the linuxaid-agent binary; a k8s API client, non-root).
launcher:
  image:
    repository: ghcr.io/obmondo/linuxaid-agent
    tag: spike
    pullPolicy: Always
  schedule: "0 * * * *"          # hourly
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      memory: 64Mi

# Per-node agent image (linuxaid-cli + entrypoint), run by the spawned Jobs.
agentImage:
  repository: ghcr.io/obmondo/linuxaid-agents
  tag: spike
  pullPolicy: Always

# certname = the CN of the obmondo-clientcert, shared by all nodes. REQUIRED.
certname: ""

# Pre-signed client cert the agent pods mount (keys: tls.crt / tls.key / ca.crt).
obmondoClientCert:
  secretName: obmondo-clientcert

# false = report-only (puppet --noop); true = apply changes (--no-noop).
enforce: false

openvoxEnvironment: master

# Optional puppetserver override; empty = resolved from the Obmondo API.
puppetServer: ""

# Only manage nodes matching this label selector ("" = all nodes).
nodeSelector: ""

# Host directory used to stage the linuxaid-cli binary onto each node.
hostObmondoPath: /opt/obmondo

# Per-node agent Job controls (passed to the launcher's fanout).
agentJob:
  ttlSecondsAfterFinished: 600
  activeDeadlineSeconds: 1200
  backoffLimit: 0          # one pod per node per run; a failed run retries next hour

# Launcher CronJob controls.
startingDeadlineSeconds: 120
successfulJobsHistoryLimit: 1
failedJobsHistoryLimit: 3
