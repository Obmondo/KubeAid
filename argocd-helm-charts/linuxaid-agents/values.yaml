# linuxaid-agents — run the LinuxAid OpenVox agent on a KubeAid node as a Job.
#
# Deploy into the namespace that holds the obmondo-clientcert secret (typically
# "monitoring"): a Job can only mount a Secret from its own namespace.

image:
  # NOTE: build + push this from linuxaid-cli (Dockerfile). Pin by digest in prod.
  repository: ghcr.io/obmondo/linuxaid-agents
  tag: spike
  pullPolicy: IfNotPresent

imagePullSecrets: []

# Node this Job runs on (spec.nodeName). REQUIRED — the agent mutates this host.
nodeName: ""

# certname = the CN of the obmondo-clientcert (e.g. "<cluster>.<customerID>").
# The entrypoint installs the mounted cert into the host puppet SSL tree under
# this name, and linuxaid-cli derives its identity from it. REQUIRED.
certname: ""

# Pre-signed client cert the pod mounts (keys: tls.crt / tls.key / ca.crt).
obmondoClientCert:
  secretName: obmondo-clientcert

# Optional: pin the puppetserver. When empty, run-openvox resolves it from the
# Obmondo API (resolveCustomerURLs).
puppetServer: ""

# LinuxAid/OpenVox environment (release branch).
openvoxEnvironment: master

# false = report-only (puppet --noop); true = apply changes (--no-noop).
enforce: false

# Host directory used to stage the linuxaid-cli binary onto the node.
hostObmondoPath: /opt/obmondo

# Run on any node, including tainted / control-plane (spike default).
tolerations:
  - operator: Exists

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    memory: 128Mi

# Job controls.
backoffLimit: 1
activeDeadlineSeconds: 1800
ttlSecondsAfterFinished: 3600
