{{/* A namespaced Role + RoleBinding pair per namespace: the agent's own
     namespace (the ArgoCD project-role JWT lives here, kubeaid-cli ≥ v0.22.4)
     plus any listed in .Values.extraSecretReaderNamespaces. Kept as Roles
     rather than one ClusterRole so the pre-existing RoleBinding's immutable
     roleRef never changes across upgrades. */}}
{{- $namespaces := list .Release.Namespace }}
{{- range .Values.extraSecretReaderNamespaces }}
  {{- if not (has . $namespaces) }}
    {{- $namespaces = append $namespaces . }}
  {{- end }}
{{- end }}
{{- range $i, $ns := $namespaces }}
{{- if $i }}
---
{{- end }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "kubeaid-agent.fullname" $ }}-secret-reader
  namespace: {{ $ns }}
  labels:
    {{- include "kubeaid-agent.labels" $ | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "kubeaid-agent.fullname" $ }}-secret-reader
  namespace: {{ $ns }}
  labels:
    {{- include "kubeaid-agent.labels" $ | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "kubeaid-agent.fullname" $ }}
    namespace: {{ $.Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "kubeaid-agent.fullname" $ }}-secret-reader
{{- end }}
