{{- if and ((.Values.global).netpol).enabled ((.Values.global).prometheusLinuxaid).netpol }}
{{- range $ns, $config := .Values.global.prometheusLinuxaid.namespaces }}
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: prometheus-linuxaid-prometheus
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/component: cilium-networkpolicy
spec:
  # Selects the Prometheus StatefulSet pods created by the Prometheus Operator.
  # The operator sets app.kubernetes.io/instance to the CR name and ignores podMetadata overrides.
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: prometheus

# =========
# INGRESS
# =========

  ingress:
    # Traefik → Prometheus port 9090.
    # Covers two traffic paths:
    #   1. Humans accessing the Prometheus web UI via the Ingress domain.
    #   2. Linux VM Prometheus agents remote-writing metrics (they push to the Ingress URL,
    #      Traefik forwards the /api/v1/write request here — enabled by enableRemoteWriteReceiver: true).
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: {{ $.Values.global.netpol.traefik.namespace }}
            {{- range $key, $value := $.Values.global.netpol.traefik.labels }}
            {{ $key }}: {{ $value }}
            {{- end }}
      toPorts:
        - ports:
            - port: "9090"
              protocol: TCP

    # Grafana → Prometheus port 9090.
    # Grafana queries Prometheus as a datasource to render dashboards.
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: {{ $ns }}
            app: grafana
      toPorts:
        - ports:
            - port: "9090"
              protocol: TCP

# =========
# EGRESS
# =========

  egress:
    # kube-dns — needed so Prometheus can resolve Kubernetes service names
    # and FQDNs during service discovery and alertmanager address lookup.
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: ANY
          rules:
            dns:
              - matchPattern: "*"

    # kube-apiserver — Prometheus Operator configures Prometheus with a Kubernetes SD config.
    # Prometheus reads pods, services, and endpoints from the API to discover scrape targets.
    - toEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
            - port: "6443"
              protocol: TCP

    # AlertManager — Prometheus sends fired alerts to AlertManager on port 9093.
    # (Separate from scraping AlertManager metrics, which is covered by the broad same-ns rule below.)
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: {{ $ns }}
            app.kubernetes.io/name: alertmanager
      toPorts:
        - ports:
            - port: "9093"
              protocol: TCP

    # All pods in the same namespace — Prometheus scrapes metrics from every pod it discovers
    # in its own namespace (AlertManager /metrics on 9093, Grafana /metrics on 3000, etc.).
    # This is intentionally broad: the exact ports depend on what ServiceMonitors are configured.
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: {{ $ns }}

    # puppetserver namespace — serviceMonitorNamespaceSelector in prometheus.yaml hardcodes this
    # namespace so Prometheus can pick up ServiceMonitors defined there and scrape puppetserver pods.
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: puppetserver

    {{- range (($config.prometheus | default dict).additionalScrapeNamespaces | default list) }}
    {{- $scrapeNs := . }}
    {{- $scrapePorts := list }}
    {{- if kindIs "map" . }}
    {{- $scrapeNs = .namespace }}
    {{- $scrapePorts = (.ports | default list) }}
    {{- end }}
    # Extra scrape namespace configured per prometheus-linuxaid deployment.
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: {{ $scrapeNs }}
    {{- if $scrapePorts }}
      toPorts:
        - ports:
          {{- range $scrapePorts }}
            - port: {{ . | quote }}
              protocol: TCP
          {{- end }}
    {{- end }}
    {{- end }}

    # -----------------------------------------------------------------------
    # EXTERNAL EXPORTERS — toCIDRSet rules for non-Kubernetes scrape targets
    #
    # These hosts run OUTSIDE Kubernetes. Kubernetes NetworkPolicy does not
    # extend to them (they are not pods/endpoints), so Cilium cannot use
    # toEndpoints here. Instead, toCIDRSet matches by IP address or CIDR,
    # giving us least-privilege egress: exact IPs, exact ports, TCP only.
    #
    # Each exporter type is a separate rule so that node-exporter CIDRs
    # cannot accidentally reach postgres-exporter ports and vice-versa.
    # -----------------------------------------------------------------------
    {{- $ext := ($config.externalExporters | default dict) }}
    {{- if $ext.enabled }}

    {{- with ($ext.node | default dict).cidrs }}
    # node-exporter (port 9100) — runs on every monitored Linux VM.
    # Reports CPU, memory, disk, network, NTP, and all other OS-level metrics.
    - toCIDRSet:
        {{- range . }}
        - cidr: {{ . }}
        {{- end }}
      toPorts:
        - ports:
            - port: "9100"
              protocol: TCP
    {{- end }}

    {{- with ($ext.postgres | default dict).cidrs }}
    # postgres-exporter (port 9187) — runs on PostgreSQL database hosts.
    # Reports query latency, connection counts, replication lag, table bloat.
    - toCIDRSet:
        {{- range . }}
        - cidr: {{ . }}
        {{- end }}
      toPorts:
        - ports:
            - port: "9187"
              protocol: TCP
    {{- end }}

    {{- with ($ext.mysql | default dict).cidrs }}
    # mysqld-exporter (port 9104) — runs on MySQL / MariaDB hosts.
    # Reports query rate, slow queries, InnoDB buffer pool, replication status.
    - toCIDRSet:
        {{- range . }}
        - cidr: {{ . }}
        {{- end }}
      toPorts:
        - ports:
            - port: "9104"
              protocol: TCP
    {{- end }}

    {{- with ($ext.haproxy | default dict).cidrs }}
    # haproxy-exporter (port 9102) — runs on HAProxy load balancer hosts.
    # Reports backend health, session counts, queue depth, error rates.
    - toCIDRSet:
        {{- range . }}
        - cidr: {{ . }}
        {{- end }}
      toPorts:
        - ports:
            - port: "9102"
              protocol: TCP
    {{- end }}

    {{- with ($ext.docker | default dict).cidrs }}
    # Docker metrics endpoint (port 9323) — enabled in Docker daemon config.
    # Reports container CPU/memory/network/disk, image counts, build times.
    - toCIDRSet:
        {{- range . }}
        - cidr: {{ . }}
        {{- end }}
      toPorts:
        - ports:
            - port: "9323"
              protocol: TCP
    {{- end }}

    {{- end }}{{/* end if ext.enabled */}}

{{- end }}
{{- end }}
