{{- if .Values.global.blackbox.enabled }}
{{- range $probe := .Values.global.blackbox.probes }}
{{- if empty $probe.urls }}
{{- fail (printf "blackbox probe module '%s' must have at least one url" $probe.module) }}
{{- end }}
---
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: blackbox-probe-{{ $.Release.Name }}-{{ $probe.module | replace "_" "-" }}
  labels:
    app.kubernetes.io/managed-by: kubeaid-addons
spec:
  interval: {{ $probe.interval | default "60s" }}
  scrapeTimeout: {{ $probe.scrapeTimeout | default "30s" }}
  module: {{ $probe.module }}
  prober:
    url: {{ $probe.exporter | default "blackbox-exporter.monitoring.svc.cluster.local:19115" }}
  tlsConfig:
    insecureSkipVerify: {{ $probe.insecureSkipVerify | default false }}
  targets:
    staticConfig:
      static:
        {{- range $probe.urls }}
        - {{ . }}
        {{- end }}
{{- end }}
{{- end }}
