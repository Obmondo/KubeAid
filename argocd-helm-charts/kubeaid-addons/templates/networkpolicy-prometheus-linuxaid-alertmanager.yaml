{{- if and ((.Values.global).netpol).enabled ((.Values.global).prometheusLinuxaid).netpol }}
{{- range $ns, $config := .Values.global.prometheusLinuxaid.namespaces }}
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: prometheus-linuxaid-alertmanager
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/component: cilium-networkpolicy
spec:
  # Selects the AlertManager StatefulSet pods created by the Prometheus Operator
  # for the Alertmanager CR named "alertmanager" in prometheus-linuxaid/templates/alertmanager.yaml.
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: alertmanager

# =========
# INGRESS
# =========

  ingress:
    # Prometheus → AlertManager ports 9093 and 8080.
    # Two distinct usages:
    #   port 9093 — Prometheus fires alerts here (Alertmanager API /api/v2/alerts).
    #               Also Prometheus scrapes AlertManager's own /metrics on this port.
    #   port 8080 — config-reloader sidecar (reloader-web), Prometheus scrapes its metrics here too.
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: {{ $ns }}
            app.kubernetes.io/name: prometheus
      toPorts:
        - ports:
            - port: "9093"
              protocol: TCP
            - port: "8080"
              protocol: TCP

    # Traefik → AlertManager port 9093.
    # Allows operators to reach the AlertManager web UI through the Ingress domain
    # (if alertmanager.ingress.enabled: true is set in values).
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: {{ $.Values.global.netpol.traefik.namespace }}
            {{- range $key, $value := $.Values.global.netpol.traefik.labels }}
            {{ $key }}: {{ $value }}
            {{- end }}
      toPorts:
        - ports:
            - port: "9093"
              protocol: TCP

# =========
# EGRESS
# =========

  egress:
    # kube-dns — AlertManager uses DNS to resolve the webhook FQDN (alerts.obmondo.com).
    # Cilium's DNS proxy must intercept the query first so it knows which IPs to allow
    # in the toFQDNs rule below.
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: ANY
          rules:
            dns:
              - matchPattern: "*"

    {{- $amCfg := ($config.alertmanager | default dict) }}
    {{- if $amCfg.webhookFQDN }}
    # Obmondo alerts webhook — AlertManager POSTs fired alerts to this FQDN over HTTPS (port 443).
    # The connection uses mutual TLS: the puppet-agent-tls-auth Kubernetes Secret (mounted into
    # the AlertManager pod via alertmanager.secrets in values) provides the client cert+key.
    # Set per namespace in values-kubeaid-addons.yaml → global.prometheusLinuxaid.namespaces.<ns>.alertmanager.webhookFQDN
    - toFQDNs:
        - matchName: {{ $amCfg.webhookFQDN | quote }}
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    {{- end }}

{{- end }}
{{- end }}
