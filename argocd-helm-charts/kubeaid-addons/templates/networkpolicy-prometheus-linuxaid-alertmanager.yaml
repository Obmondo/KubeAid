{{- if and ((.Values.global).netpol).enabled ((.Values.global).prometheusLinuxaid).netpol }}
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: prometheus-linuxaid-alertmanager
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/component: cilium-networkpolicy
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: alertmanager

# =========
# INGRESS
# =========

  ingress:
    # Prometheus → AlertManager ports 9093 and 8080.
    # port 9093 — Prometheus fires alerts (Alertmanager API /api/v2/alerts) and scrapes /metrics.
    # port 8080 — config-reloader sidecar metrics.
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: {{ .Release.Namespace }}
            app.kubernetes.io/name: prometheus
      toPorts:
        - ports:
            - port: "9093"
              protocol: TCP
            - port: "8080"
              protocol: TCP

    # Traefik → AlertManager port 9093 (AlertManager web UI via Ingress).
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: {{ .Values.global.netpol.traefik.namespace }}
            {{- range $key, $value := .Values.global.netpol.traefik.labels }}
            {{ $key }}: {{ $value }}
            {{- end }}
      toPorts:
        - ports:
            - port: "9093"
              protocol: TCP

# =========
# EGRESS
# =========

  egress:
    # kube-dns — AlertManager resolves the webhook FQDN via DNS.
    # Cilium's DNS proxy intercepts the query to learn which IPs map to that FQDN
    # so the toFQDNs rule below can enforce egress by name, not by IP.
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: ANY
          rules:
            dns:
              - matchPattern: "*"

    {{- if .Values.global.prometheusLinuxaid.alertmanager.webhookFQDN }}
    # Obmondo alerts webhook — AlertManager POSTs fired alerts over HTTPS (port 443).
    - toFQDNs:
        - matchName: {{ .Values.global.prometheusLinuxaid.alertmanager.webhookFQDN | quote }}
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    {{- end }}

{{- end }}
