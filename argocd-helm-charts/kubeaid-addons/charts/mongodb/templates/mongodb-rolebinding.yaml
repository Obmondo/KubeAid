{{ if .Values.global.mongodb.enabled }}
---
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: {{ .Values.global.mongodb.serviceAccountName }}
  namespace: {{ .Release.Namespace }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.global.mongodb.serviceAccountName }}
roleRef:
  kind: Role
  name: {{ .Values.global.mongodb.serviceAccountName }}
  apiGroup: rbac.authorization.k8s.io
---
{{ end }}
