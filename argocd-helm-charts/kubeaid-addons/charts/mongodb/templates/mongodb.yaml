{{ if .Values.global.mongodb.enabled }}
---
apiVersion: mongodbcommunity.mongodb.com/v1
kind: MongoDBCommunity
metadata:
  name: {{ .Values.global.mongodb.instanceName }}
  namespace: {{ .Release.Namespace }}
spec:
  members: {{ .Values.global.mongodb.replicas | default 2 }}
  type: ReplicaSet
  version: {{ .Values.global.mongodb.version | default "7.0.28" }}
  security:
    authentication:
      modes: ["SCRAM"]
  statefulSet:
    spec:
      template:
        metadata:
          labels:
            app.kubernetes.io/name: mongodb
            app.kubernetes.io/instance: {{ .Values.global.mongodb.instanceName }}
            app.kubernetes.io/component: database
            {{- range $key, $val := .Values.global.mongodb.podLabels }}
            {{ $key }}: {{ $val }}
            {{- end }}
        spec:
          serviceAccountName: {{ .Values.global.mongodb.serviceAccountName }}
          containers:
            - name: mongod
              {{- if .Values.global.mongodb.resources }}
              resources:
                  {{- toYaml .Values.global.mongodb.resources | nindent 16 }}
              {{- end }}
      volumeClaimTemplates:
        - metadata:
            name: data-volume
            labels:
              velero.io/exclude-from-backup: "true"
            spec:
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: {{ .Values.global.mongodb.dataVolume.size}}
        - metadata:
            name: logs-volume
            labels:
              velero.io/exclude-from-backup: "true"
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: {{ .Values.global.mongodb.logsVolume.size}}
  {{- if .Values.global.mongodb.users }}
  users:
    {{- range .Values.global.mongodb.users }}
    - db: {{ .db }}
      name: {{ .name }}
      passwordSecretRef:
        name: {{ .passwordSecretRef.name }}
      roles:
        {{- range .roles }}
        - db: {{ .db }}
          name: {{ .name }}
        {{- end }}
      scramCredentialsSecretName: {{ .scramCredentialsSecretName }}
    {{- end }}
  {{- end }}
  agent:
    logLevel: INFO
---
{{ end }}
