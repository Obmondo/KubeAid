{{/* Handling control-plane in HCloud. */}}
{{- if or (eq .Values.mode "hcloud") (eq .Values.mode "hybrid") }}
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: HCloudMachineTemplate
metadata:
  name: {{ include "hetzner.hcloudControlPlaneMachineTemplateName" . }}
  {{- if .Values.global.machineTemplateRotation }}
  annotations:
    {{/* A rotated template is superseded, never updated: the next spec change
         renders a differently-named object and this one falls out of the
         manifest. Pruning it while the rollout it triggered is still in flight
         would strand a MachineSet that still references it, so leave the stale
         templates behind. They hold no resources and can be deleted by hand
         once every Machine has moved off them. */}}
    argocd.argoproj.io/sync-options: Prune=false
  {{- end }}
spec:
  template:
    metadata:
      labels:
        node.cluster.x-k8s.io/cloud-provider: hcloud
    spec:
      {{- include "hetzner.hcloudControlPlaneMachineTemplateSpec" . | nindent 6 }}
{{- end }}

{{/* Handling node-groups in HCloud. */}}
{{- if or (eq .Values.mode "hcloud") (eq .Values.mode "hybrid") }}
{{- range $nodeGroupIndex, $nodeGroup := $.Values.nodeGroups.hcloud }}
{{- $ctx := dict "root" $ "nodeGroup" $nodeGroup }}
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: HCloudMachineTemplate
metadata:
  name: {{ include "hetzner.hcloudNodeGroupMachineTemplateName" $ctx }}
  {{- if $.Values.global.machineTemplateRotation }}
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
  {{- end }}
spec:
  template:
    metadata:
      labels:
        node.cluster.x-k8s.io/cloud-provider: hcloud
    spec:
      {{- include "hetzner.hcloudNodeGroupMachineTemplateSpec" $ctx | nindent 6 }}
{{- end }}
{{- end }}
