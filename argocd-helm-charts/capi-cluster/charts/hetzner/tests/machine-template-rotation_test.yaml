## Guards the invariant that makes day-2 instance-type changes work.
##
## ClusterAPI decides a Machine is out of date only when the *name* of the
## template it was cloned from stops matching the name its owner references.
## It never compares template contents. So:
##
##   * a changed machineType MUST produce a new template name (-> rollout), and
##   * a changed replicas count MUST NOT (-> plain scale-out, members join etcd).
##
## The hash literals below are the real rendered values. If you intentionally
## change what goes into a MachineTemplate spec, they will change together with
## the name helper — update them. If only ONE of a name/infrastructureRef pair
## changes, the helpers have drifted apart and the cluster would never roll.
suite: hcloud MachineTemplate name rotation
templates:
  - "*.yaml"
release:
  name: demo
chart:
  version: 1.0.0
  appVersion: 1.0.0
values:
  - ../values.example.hcloud.yaml
set:
  global.clusterName: demo
  global.kubernetes.version: v1.33.0
  global.clusterAPI.version: v1.11.3
  global.caph.version: v1.1.7
  global.enableClusterAutoscaler: true
  global.kubeaid.repo: https://github.com/Obmondo/KubeAid.git
  global.kubeaid.version: "31.1.1"
  global.kubeaidStoragectl.version: ""
  global.kubeaidConfig.repo: https://example.com/acme/kubeaid-config.git
  global.pods.cidrBlock: 10.244.0.0/16
  global.additionalUsers: []
tests:
  ## ---------------------------------------------------------------- legacy
  - it: keeps the fixed template names when rotation is off
    template: HCloudMachineTemplate.yaml
    documentIndex: 0
    asserts:
      - equal:
          path: metadata.name
          value: demo-control-plane
      - isNull:
          path: metadata.annotations

  - it: keeps the control-plane infrastructureRef on the fixed name when rotation is off
    template: KubeadmControlPlane.yaml
    asserts:
      - equal:
          path: spec.machineTemplate.spec.infrastructureRef.name
          value: demo-control-plane

  - it: keeps node-group infrastructureRefs on the fixed names when rotation is off
    template: MachineDeployment.yaml
    documentIndex: 0
    asserts:
      - equal:
          path: spec.template.spec.infrastructureRef.name
          value: demo-md-0

  ## -------------------------------------------------------------- rotation
  - it: suffixes the control-plane template with a hash of its spec
    template: HCloudMachineTemplate.yaml
    documentIndex: 0
    set:
      global.machineTemplateRotation: true
    asserts:
      - equal:
          path: metadata.name
          value: demo-control-plane-62e79e6e
      - equal:
          path: metadata.annotations['argocd.argoproj.io/sync-options']
          value: Prune=false

  - it: points the control-plane infrastructureRef at the rotated template name
    template: KubeadmControlPlane.yaml
    set:
      global.machineTemplateRotation: true
    asserts:
      ## Must be byte-identical to the metadata.name asserted above — a
      ## KubeadmControlPlane referencing a template that does not exist wedges
      ## the controller, and one referencing a stale name never rolls.
      - equal:
          path: spec.machineTemplate.spec.infrastructureRef.name
          value: demo-control-plane-62e79e6e

  - it: suffixes each node-group template and its MachineDeployment ref alike
    template: MachineDeployment.yaml
    documentIndex: 0
    set:
      global.machineTemplateRotation: true
    asserts:
      - equal:
          path: spec.template.spec.infrastructureRef.name
          value: demo-md-0-1332fd9d

  - it: leaves the MachineDeployment name and bootstrap configRef unrotated
    template: MachineDeployment.yaml
    documentIndex: 0
    set:
      global.machineTemplateRotation: true
    asserts:
      ## Only the infrastructure template rotates. Rotating the MachineDeployment
      ## itself would orphan its MachineSets; rotating the KubeadmConfigTemplate
      ## would roll nodes on every bootstrap-config edit.
      - equal:
          path: metadata.name
          value: demo-md-0
      - equal:
          path: spec.template.spec.bootstrap.configRef.name
          value: demo-md-0

  ## ------------------------------------------------- the two day-2 outcomes
  - it: does NOT rotate the control-plane name when only replicas change
    template: KubeadmControlPlane.yaml
    set:
      global.machineTemplateRotation: true
      controlPlane.hcloud.replicas: 1
    asserts:
      ## Same hash as the replicas=3 case above. This is what makes a 1 -> 3
      ## scale-out ADD control-plane members that join etcd, rather than
      ## replacing the existing one.
      - equal:
          path: spec.machineTemplate.spec.infrastructureRef.name
          value: demo-control-plane-62e79e6e
      - equal:
          path: spec.replicas
          value: 1

  - it: rotates the control-plane name when machineType changes
    template: KubeadmControlPlane.yaml
    set:
      global.machineTemplateRotation: true
      controlPlane.hcloud.machineType: cax31
    asserts:
      ## Differs from the cax21 hash, so ClusterAPI sees the template as rotated
      ## and performs a surge-then-remove rolling replacement.
      - equal:
          path: spec.machineTemplate.spec.infrastructureRef.name
          value: demo-control-plane-226ca835

  - it: leaves node groups alone when only the control-plane machineType changes
    template: MachineDeployment.yaml
    documentIndex: 0
    set:
      global.machineTemplateRotation: true
      controlPlane.hcloud.machineType: cax31
    asserts:
      ## Unchanged from the baseline rotation hash: a control-plane re-type must
      ## not roll worker nodes.
      - equal:
          path: spec.template.spec.infrastructureRef.name
          value: demo-md-0-1332fd9d
