suite: hcloud mode with private network
templates:
  - "*.yaml"
release:
  name: demo
chart:
  version: 1.0.0
  appVersion: 1.0.0
values:
  - ../values.example.hcloud.yaml
set:
  mode: hcloud
  network.type: private
  global.clusterName: demo
  global.kubernetes.version: v1.33.0
  global.pods.cidrBlock: 10.244.0.0/16
  global.additionalUsers: []
tests:
  - it: renders the core CAPI Cluster resource
    template: Cluster.yaml
    asserts:
      - isKind:
          of: Cluster
      - equal:
          path: metadata.name
          value: demo

  - it: renders HetznerCluster with an HCloud private network
    template: HetznerCluster.yaml
    asserts:
      - isKind:
          of: HetznerCluster
      - equal:
          path: spec.hcloudNetwork.enabled
          value: true
      - equal:
          path: spec.hcloudNetwork.cidrBlock
          value: 10.0.0.0/16
      - equal:
          path: spec.hcloudNetwork.subnetCidrBlock
          value: 10.0.0.0/24

  - it: keeps public IPv4 and IPv6 disabled on every HCloud machine
    template: HCloudMachineTemplate.yaml
    asserts:
      - equal:
          path: spec.template.spec.publicNetwork.enableIPv4
          value: false
      - equal:
          path: spec.template.spec.publicNetwork.enableIPv6
          value: false

  - it: writes and invokes the NAT gateway bootstrap on the control plane
    template: KubeadmControlPlane.yaml
    asserts:
      - contains:
          path: spec.kubeadmConfigSpec.preKubeadmCommands
          content: chmod +x /connect-nat-gateway.sh && /connect-nat-gateway.sh

  - it: writes and invokes the NAT gateway bootstrap on HCloud workers
    template: KubeadmConfigTemplate.yaml
    asserts:
      - contains:
          path: spec.template.spec.preKubeadmCommands
          content: chmod +x /connect-nat-gateway.sh && /connect-nat-gateway.sh

  - it: renders no bare-metal resources in hcloud mode
    template: HetznerBareMetalHost.yaml
    asserts:
      - hasDocuments:
          count: 0
