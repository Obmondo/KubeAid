global:
  kubernetes:
    version: v1.33.0
  clusterAPI:
    version: v1.11.3
  enableClusterAutoscaler: true
  capa:
    version: v2.9.2
    enableMachinePools: false
  caph:
    version: v1.1.7
  capz:
    version: v1.21.1
  kubeaid:
    repo: https://github.com/Obmondo/KubeAid.git
    # KubeAid git ref the postKubeadmCommands `git clone` checks out
    # on every control-plane node. Set to a release tag (e.g. "29.0.4")
    # to pin the in-node clone to the same version kubeaid-cli rendered
    # this chart against — otherwise the in-node clone takes master HEAD
    # and the manifests Cilium / CCM are installed from can drift from
    # the rendered chart. Empty leaves the clone unpinned (master).
    version: ""
  # kubeaid-storagectl is fetched at cloud-init by the Hetzner bare-metal
  # KubeadmConfig / KubeadmControlPlane templates. The binary is published
  # as a standalone release asset by kubeaid-cli's goreleaser config.
  # Set version to a release tag (e.g. "v0.22.5") to pin; leave empty to
  # use the "latest release" redirect.
  kubeaidStoragectl:
    version: ""
  pods:
    cidrBlock: 10.244.0.0/16
  # -- Name hcloud MachineTemplates after a hash of their spec, so a changed
  # `machineType` (or `imageName`) rotates the name and ClusterAPI performs a
  # rolling replacement. ClusterAPI compares only the template's *name* when
  # deciding whether a Machine is up to date — never the template's contents —
  # so with the fixed legacy name an instance-type change never rolls, and
  # applies silently to machines created later.
  #
  # Turning this on renames the template even when its spec is unchanged, which
  # rolls the control plane once. Scale to >= 3 control-plane replicas before
  # enabling it, so etcd keeps quorum while the machines are replaced one by one.
  # Leave false on an existing cluster until you are ready for that roll.
  #
  # Hetzner hcloud only. Bare-metal templates keep their fixed names — their
  # workers are Machine objects, not MachineDeployments.
  machineTemplateRotation: false
  # -- Extra OS users to create on every node during bootstrap.
  # Each entry expects:
  #   name           : login name to create.
  #   sshPublicKeys  : list of SSH public keys to authorize for the user.
  additionalUsers: []

provider:
  hetzner: false
  aws: false
  azure: false
