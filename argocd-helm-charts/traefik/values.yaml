# Added features outside upstream chart
middleware:
  jwt:
    enabled: false
    headers:
      X-Subject: sub
      # public_key: |
      #   -----BEGIN PUBLIC KEY-----
      #   Asdads
      #   -----END PUBLIC KEY-----
traefik:
  instanceLabelOverride: traefik
  podDisruptionBudget:
    enabled: true
    maxUnavailable: 1
  # DaemonSet + hostPort: delete old pod before starting new (see charts/traefik/EXAMPLES.md).
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  # NOTE: this is to disable the anonymous usage reporting - https://doc.traefik.io/traefik/contributing/data-collection/
  deployment:
    replicas: 2
    revisionHistoryLimit: 0
  log:
    level: INFO
  ports:
    web:
      http:
        redirections:
          entryPoint:
            to: websecure
            scheme: https
            permanent: true
    websecure:
      http:
        tls:
          enabled: true

  additionalArguments:
    - "--entrypoints.web.proxyprotocol=true"
    - "--entrypoints.web.proxyprotocol.insecure=true"
    - "--entrypoints.websecure.proxyprotocol=true"
    - "--entrypoints.websecure.proxyprotocol.insecure=true"
  # https://github.com/argoproj/argo-cd/issues/1704#issuecomment-904741817
  providers:
    kubernetesIngress:
      publishedService:
        enabled: true

  metrics:
    prometheus:
      serviceMonitor:
        enabled: true
        jobLabel: traefik
        interval: 10s
        honorLabels: true
# defines an ingressroute (public url - custom traefik CRD that replaces generic ingress type) for traefik dashboard. Not advised to enable - and below needs addition of a specific url to be accessible.
#  ingressRoute:
#    dashboard:
#      enabled: true
#      annotations:
#        traefik.ingress.kubernetes.io/router.tls: "true"
#        cert-manager.io/cluster-issuer: letsencrypt

# Internal Traefik instance (aliased subchart above), OFF by default. A
# ClusterIP-only controller with its own `traefik-internal` IngressClass, for
# internal / mesh-only domains reached over the NetBird mesh instead of a public
# HCloud LB. Deliberately NOT the default IngressClass and NO proxyprotocol
# (there's no LB in front to originate PROXY headers). Web/TLS entrypoints keep
# upstream defaults; internal Ingresses set their own TLS. kubeaid-cli flips
# enabled=true when a NetBird Mgmt key is configured, and the netbird-operator
# then exposes the traefik-internal Service to the mesh via a networkResource.
traefik-internal:
  enabled: false
  fullnameOverride: traefik-internal
  instanceLabelOverride: traefik-internal
  service:
    # traefik chart v41 nests the Service type under service.spec (v29 used
    # service.type). ClusterIP is load-bearing: the upstream default is
    # LoadBalancer, which would provision a second public LB.
    spec:
      type: ClusterIP
  ingressClass:
    enabled: true
    isDefaultClass: false
    name: traefik-internal
  deployment:
    replicas: 1
