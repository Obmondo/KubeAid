{{- range .Values.prometheus.serviceMonitorNamespaces }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: prometheus-k8s-{{ template "prometheus-linuxaid.namespace" $ }}
  namespace: {{ . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: prometheus-k8s
subjects:
- kind: ServiceAccount
  name: prometheus-k8s
  namespace: {{ template "prometheus-linuxaid.namespace" $ }}
{{- end }}
