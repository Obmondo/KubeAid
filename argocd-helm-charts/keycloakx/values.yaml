keycloakx:
  command:
    - "/opt/keycloak/bin/kc.sh"
    - "--verbose"
    - "start"
    - "--http-enabled=true"
    - "--http-port=8080"
    - "--hostname-strict=false"
    - "--spi-events-listener-jboss-logging-success-level=info"
    - "--spi-events-listener-jboss-logging-error-level=warn"
  proxy:
    mode: xforwarded
  database:
    vendor: postgres
    hostname: keycloak-pgsql-rw
    port: 5432
    database: keycloak
  extraEnv: |
    - name: KC_DB_USERNAME
      valueFrom:
        secretKeyRef:
          name: keycloak-pgsql-app
          key: username
    - name: KC_DB_PASSWORD
      valueFrom:
        secretKeyRef:
          name: keycloak-pgsql-app
          key: password
    - name: KEYCLOAK_ADMIN
      value: admin
    - name: KEYCLOAK_ADMIN_PASSWORD
      valueFrom:
        secretKeyRef:
          name: keycloak-admin
          key: KEYCLOAK_PASSWORD
    - name: JAVA_OPTS_APPEND
      value: >-
        -Djgroups.dns.query={{ include "keycloak.fullname" . }}-headless

  resources:
    requests:
      cpu: 500m
      memory: 300Mi
    limits:
      memory: 1000Mi

  dbchecker:
    enabled: true

global:

  netpol:
    enabled: false
    releaseName: ""
    traefik:
      namespace: ""
      labels: {}

  keycloakx:
    netpol: false

  blackbox:
    netpol: false
    namespace: ""

  postgresql:
    enabled: true
    instanceName: keycloak

    # CloudNativePG (CNPG) currently doesn't support in-place recovery of a cluster.
    #
    # This means : suppose a cluster initially was using
    # s3://blackwoodseven-cnpg-poc/keycloakx/keycloak-pgsql to store its backups. While recovering
    # the cluster, you'll recover from that path, but you cannot write any further backups of the
    # recovered cluster to that path.
    #
    # That's why, to keep the cluster name same, we initially change the path to
    # s3://blackwoodseven-cnpg-poc/keycloakx/keycloak-pgsql/revision-0. And everytime you recover
    # the cluster, you increment that revision number, and the S3 path will change.
    monitoring:
      enablePodMonitor: true
    revision: 0
    instances: 1

    resources:
      requests:
        cpu: 100m
        memory: 500Mi
      limits:
        memory: 800Mi

    size: 4Gi
    # storageClass intentionally unset — postgresql-cluster.yaml's
    # `{{- if $postgresql.storageClass }}` omits the field from the
    # CNPG Cluster spec, letting cnpg fall back to the cluster's
    # default StorageClass (hcloud-volumes on Hetzner, ebs-csi on
    # AWS, etc.). Operators who want to pin a specific class can
    # override via their values-keycloakx.yaml. The previous value
    # of "default" literally referenced a StorageClass named
    # "default" — which doesn't exist on any modern provisioner —
    # so the PVC stayed Pending forever with
    # `storageclass.storage.k8s.io "default" not found`.
    logicalbackup:
      enabled: false
      schedule: "0 0 * * *"
      provider: s3
      retention: "30d"

    recover:
      enabled: false
      revision: 0

    backups:
      enabled: false

      schedule: "0 0 * * *"
      retentionPolicy: 30d

      # Currently, we support : AWS and Azure.
      provider: aws

      aws:
        # Whether to enable Kube2IAM integration, instead of providing static AWS credentials
        # from a Kubernetes Secret.
        enableKube2IAMIntegration: true

blackbox:
  probe: true
